name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-17 cppcheck

      - name: clang-format check
        run: |
          find src/ -name '*.cpp' -o -name '*.h' | \
            xargs clang-format-17 --style=file --dry-run --Werror

      - name: cppcheck
        run: |
          cppcheck --enable=warning,style,performance --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unknownMacro \
            --suppress=preprocessorErrorDirective \
            --suppress=returnDanglingLifetime \
            --suppress=ignoredReturnValue \
            --suppress=uselessCallsSubstr \
            --suppress=constVariablePointer \
            --suppress=toomanyconfigs \
            --suppress='*:dependencies/*' \
            -I src -I dependencies \
            --std=c++23 \
            src/

  tidy:
    name: Tidy
    runs-on: windows-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5

      - name: Install LLVM
        run: choco install llvm --version=19.1.7 -y --no-progress
        shell: pwsh

      - name: clang-tidy
        run: |
          $files = Get-ChildItem -Path src -Recurse -Include *.cpp |
                   Where-Object { $_.FullName -notlike '*dependencies*' } |
                   ForEach-Object { $_.FullName }
          clang-tidy --warnings-as-errors=* `
            -extra-arg=-Wno-microsoft-cast `
            @files `
            -- -std=c++23 -I src -I dependencies `
            -DNOMINMAX -DWIN32_LEAN_AND_MEAN -D_DEBUG `
            -fms-extensions -fms-compatibility
        shell: pwsh

  build:
    name: Build
    runs-on: windows-latest
    needs: [lint, tidy]
    strategy:
      matrix:
        config: [Debug, Release]
    steps:
      - uses: actions/checkout@v5

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config ${{ matrix.config }} --parallel

      - name: Upload DLL
        uses: actions/upload-artifact@v5
        with:
          name: variant-${{ matrix.config }}
          path: build/${{ matrix.config }}/variant.dll
